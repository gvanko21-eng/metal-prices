<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>贵金属价格 · 金&银</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: #d2d2d7;
            --accent: #0071e3;
            --gold: #d4a017;
            --silver: #86868b;
            --radius: 20px;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .main-container { display: flex; gap: 24px; width: 100%; max-width: 1280px; flex-wrap: wrap; justify-content: center; }
        .panel {
            flex: 1 1 460px; min-width: 340px; max-width: 600px;
            background: var(--card-bg); border-radius: var(--radius);
            padding: 32px 28px 28px; box-shadow: var(--shadow);
            display: flex; flex-direction: column; border: 1px solid var(--border);
        }
        .panel-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid #e5e5ea; }
        .panel-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #f2f2f7; }
        .panel-title { font-size: 1.2rem; font-weight: 600; }
        .panel-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-top: 3px; }
        .metal-section { background: #f9f9fb; border-radius: 14px; padding: 20px 18px; margin-bottom: 16px; border-left: 4px solid transparent; }
        .gold-section { border-left-color: var(--gold); }
        .silver-section { border-left-color: var(--silver); }
        .metal-label { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .metal-dot { width: 12px; height: 12px; border-radius: 50%; }
        .gold-dot { background: var(--gold); }
        .silver-dot { background: var(--silver); }
        .metal-name { font-weight: 600; font-size: 1rem; }
        .metal-symbol { font-size: 0.7rem; color: var(--text-secondary); background: #e5e5ea; padding: 3px 10px; border-radius: 20px; }
        .price-main-row { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 10px; }
        .price-block { flex: 1 1 140px; background: #fff; border-radius: 12px; padding: 14px; text-align: center; border: 1px solid #efeff1; }
        .unit-label { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 6px; }
        .price-value { font-size: 1.6rem; font-weight: 600; transition: color 0.3s; }
        .price-flash { animation: flash 0.8s ease-out; }
        @keyframes flash { 0% { color: var(--accent); } 100% { color: var(--text); } }
        .gram-price-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; padding-top: 12px; border-top: 1px dashed #e0e0e5; }
        .gram-price-item { flex: 1 1 100px; font-size: 0.78rem; color: var(--text-secondary); text-align: center; }
        .gram-price-item span { color: #1d1d1f; font-weight: 600; font-size: 0.9rem; }
        .domestic-price-row { display: flex; flex-wrap: wrap; gap: 16px; }
        .domestic-card { flex: 1 1 170px; background: #fff; border-radius: 16px; padding: 20px 16px; text-align: center; border: 1px solid #efeff1; }
        .gold-domestic { border-bottom: 4px solid var(--gold); }
        .silver-domestic { border-bottom: 4px solid var(--silver); }
        .dc-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 10px; }
        .dc-price { font-size: 2rem; font-weight: 600; color: #1d1d1f; line-height: 1.2; }
        .dc-unit { font-size: 0.75rem; color: var(--text-secondary); margin-top: 6px; }
        .dc-note { font-size: 0.7rem; color: #98989d; margin-top: 8px; }
        .status-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: auto; padding-top: 16px; border-top: 1px solid #e5e5ea; font-size: 0.75rem; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.online { background: #34c759; }
        .status-dot.offline { background: #ff3b30; }
        .status-dot.loading-dot { background: #ff9f0a; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .refresh-btn { background: #f2f2f7; border: 1px solid #d2d2d7; color: #1d1d1f; padding: 8px 18px; border-radius: 24px; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
        .refresh-btn:active { transform: scale(0.96); }
        .countdown-text { font-family: monospace; font-size: 0.75rem; color: #98989d; }
        .data-source { font-size: 0.7rem; color: #98989d; text-align: center; margin-top: 12px; padding-top: 10px; border-top: 1px dashed #e0e0e5; }
        .error-detail { font-size: 0.65rem; color: #ff3b30; text-align: center; margin-top: 4px; }
        @media (max-width: 800px) {
            .panel { padding: 20px 18px 18px; }
            .price-value { font-size: 1.3rem; }
            .dc-price { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- 左侧国际 -->
    <div class="panel">
        <div class="panel-header"><div class="panel-icon">🌍</div><div><div class="panel-title">国际实时报价</div><div class="panel-subtitle">International Spot</div></div></div>
        <div class="metal-section gold-section">
            <div class="metal-label"><span class="metal-dot gold-dot"></span><span class="metal-name">黄金 Gold</span><span class="metal-symbol">XAU</span></div>
            <div class="price-main-row">
                <div class="price-block"><div class="unit-label">💵 美元/盎司</div><div class="price-value" id="goldUsdOz">--</div></div>
                <div class="price-block"><div class="unit-label">💴 人民币/盎司</div><div class="price-value" id="goldCnyOz">--</div></div>
            </div>
            <div class="gram-price-row">
                <div class="gram-price-item">美元/克 <span id="goldUsdGram">--</span></div>
                <div class="gram-price-item">人民币/克 <span id="goldCnyGram">--</span></div>
            </div>
        </div>
        <div class="metal-section silver-section">
            <div class="metal-label"><span class="metal-dot silver-dot"></span><span class="metal-name">白银 Silver</span><span class="metal-symbol">XAG</span></div>
            <div class="price-main-row">
                <div class="price-block"><div class="unit-label">💵 美元/盎司</div><div class="price-value" id="silverUsdOz">--</div></div>
                <div class="price-block"><div class="unit-label">💴 人民币/盎司</div><div class="price-value" id="silverCnyOz">--</div></div>
            </div>
            <div class="gram-price-row">
                <div class="gram-price-item">美元/克 <span id="silverUsdGram">--</span></div>
                <div class="gram-price-item">人民币/克 <span id="silverCnyGram">--</span></div>
            </div>
        </div>
        <div class="status-bar">
            <span><span class="status-dot loading-dot" id="intlStatusDot"></span><span id="intlStatusText">加载中...</span></span>
            <span class="countdown-text" id="intlCountdown"></span>
            <button class="refresh-btn" onclick="fetchAllData(true)">🔄 刷新</button>
        </div>
        <div class="data-source">数据：Coinbase / Metals.live ｜ 汇率：exchangerate-api</div>
        <div class="error-detail" id="intlError"></div>
    </div>
    <!-- 右侧国内 -->
    <div class="panel">
        <div class="panel-header"><div class="panel-icon">🏭</div><div><div class="panel-title">国内批发参考价</div><div class="panel-subtitle">人民币/克</div></div></div>
        <div class="domestic-price-row">
            <div class="domestic-card gold-domestic"><div class="dc-label">🥇 黄金批发克价</div><div class="dc-price" id="domesticGoldPrice">--</div><div class="dc-unit">人民币/克</div><div class="dc-note">金价 + 5.0 溢价</div></div>
            <div class="domestic-card silver-domestic"><div class="dc-label">🥈 白银批发克价</div><div class="dc-price" id="domesticSilverPrice">--</div><div class="dc-unit">人民币/克</div><div class="dc-note">银价 + 0.5 溢价</div></div>
        </div>
        <div class="status-bar" style="margin-top:20px;">
            <span><span class="status-dot loading-dot" id="domesticStatusDot"></span><span id="domesticStatusText">加载中...</span></span>
            <span class="countdown-text" id="domesticCountdown"></span>
            <button class="refresh-btn" onclick="fetchAllData(true)">🔄 刷新</button>
        </div>
        <div class="data-source">国际现货人民币克价 + 固定溢价</div>
        <div class="error-detail" id="domesticError"></div>
    </div>
</div>
<script>
    (function() {
        const OZ_TO_GRAM = 31.1034768;
        const REFRESH_INTERVAL = 60;
        const GOLD_PREMIUM = 5.0;
        const SILVER_PREMIUM = 0.5;
        const TIMEOUT_MS = 15000;

        const $ = id => document.getElementById(id);
        const goldUsdOz = $('goldUsdOz'), goldCnyOz = $('goldCnyOz'), goldUsdGram = $('goldUsdGram'), goldCnyGram = $('goldCnyGram');
        const silverUsdOz = $('silverUsdOz'), silverCnyOz = $('silverCnyOz'), silverUsdGram = $('silverUsdGram'), silverCnyGram = $('silverCnyGram');
        const domesticGoldPrice = $('domesticGoldPrice'), domesticSilverPrice = $('domesticSilverPrice');
        const intlStatusDot = $('intlStatusDot'), intlStatusText = $('intlStatusText'), intlCountdown = $('intlCountdown'), intlError = $('intlError');
        const domesticStatusDot = $('domesticStatusDot'), domesticStatusText = $('domesticStatusText'), domesticCountdown = $('domesticCountdown'), domesticError = $('domesticError');

        let exchangeRate = null, countdown = REFRESH_INTERVAL, isFetching = false;
        let previousPrices = { gold: null, silver: null, domGold: null, domSilver: null };

        function formatMoney(num, d=2) { return (num==null||isNaN(num)) ? '--' : Number(num).toFixed(d); }
        function flash(el) { if(!el) return; el.classList.remove('price-flash'); void el.offsetWidth; el.classList.add('price-flash'); }
        function updatePrice(el, val, fmt, key) {
            if(!el) return;
            const str = fmt(val);
            if(el.textContent !== str && el.textContent !== '--' && previousPrices[key] != null) flash(el);
            el.textContent = str;
            if(key && val != null && !isNaN(val)) previousPrices[key] = val;
        }

        // 带超时fetch
        function fetchWithTimeout(url, timeout = TIMEOUT_MS) {
            return new Promise((resolve, reject) => {
                const controller = new AbortController();
                const timer = setTimeout(() => { controller.abort(); reject(new Error('超时')); }, timeout);
                fetch(url, { signal: controller.signal }).then(resp => { clearTimeout(timer); resolve(resp); }).catch(err => { clearTimeout(timer); reject(err); });
            });
        }

        // 通过 CORS 代理请求（备用通道）
        async function fetchViaProxy(url, timeout = TIMEOUT_MS) {
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
            return fetchWithTimeout(proxyUrl, timeout);
        }

        // 汇率
        async function fetchExchangeRate() {
            try {
                const resp = await fetchWithTimeout('https://api.exchangerate-api.com/v4/latest/USD', 8000);
                if(!resp.ok) throw new Error('状态'+resp.status);
                const data = await resp.json();
                if(data?.rates?.CNY) exchangeRate = data.rates.CNY;
            } catch(e) {
                console.warn('汇率失败');
                if(!exchangeRate) exchangeRate = 7.25;
            }
            return exchangeRate;
        }

        // 金属价格（多源自动切换 + 代理备用）
        async function fetchMetalPrice(metal) {
            const coinSymbol = metal === 'gold' ? 'XAU' : 'XAG';
            const urls = [
                `https://api.coinbase.com/v2/prices/${coinSymbol}-USD/spot`,
                `https://api.metals.live/v1/spot/${metal}`,
            ];

            for (const url of urls) {
                try {
                    const resp = await fetchWithTimeout(url, TIMEOUT_MS);
                    if(!resp.ok) continue;
                    const data = await resp.json();
                    if(url.includes('coinbase') && data?.data?.amount) return parseFloat(data.data.amount);
                    if(url.includes('metals.live')) {
                        if(Array.isArray(data) && data.length && typeof data[0].price === 'number') return data[0].price;
                        if(data && typeof data.price === 'number') return data.price;
                    }
                } catch(e) { console.warn(`直连失败: ${url}`); }
            }

            // 直连全失败，尝试通过代理访问 Coinbase
            try {
                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(`https://api.coinbase.com/v2/prices/${coinSymbol}-USD/spot`)}`;
                const resp = await fetchWithTimeout(proxyUrl, TIMEOUT_MS);
                if(resp.ok) {
                    const data = await resp.json();
                    if(data?.data?.amount) return parseFloat(data.data.amount);
                }
            } catch(e) { console.warn('代理也失败'); }

            return null;
        }

        function updateUI(metal, priceUsdOz, rate) {
            const priceCnyOz = priceUsdOz * rate;
            const priceUsdGram = priceUsdOz / OZ_TO_GRAM;
            const priceCnyGram = priceCnyOz / OZ_TO_GRAM;
            if(metal === 'gold') {
                updatePrice(goldUsdOz, priceUsdOz, v => '$'+formatMoney(v,2), 'gold');
                updatePrice(goldCnyOz, priceCnyOz, v => '¥'+formatMoney(v,2));
                updatePrice(goldUsdGram, priceUsdGram, v => '$'+formatMoney(v,2));
                updatePrice(goldCnyGram, priceCnyGram, v => '¥'+formatMoney(v,2));
                updatePrice(domesticGoldPrice, priceCnyGram + GOLD_PREMIUM, v => '¥'+formatMoney(v,2), 'domGold');
            } else {
                updatePrice(silverUsdOz, priceUsdOz, v => '$'+formatMoney(v,2), 'silver');
                updatePrice(silverCnyOz, priceCnyOz, v => '¥'+formatMoney(v,2));
                updatePrice(silverUsdGram, priceUsdGram, v => '$'+formatMoney(v,4));
                updatePrice(silverCnyGram, priceCnyGram, v => '¥'+formatMoney(v,4));
                updatePrice(domesticSilverPrice, priceCnyGram + SILVER_PREMIUM, v => '¥'+formatMoney(v,2), 'domSilver');
            }
        }

        function setStatus(success, errorMsg = '') {
            const status = success ? 'online' : 'offline';
            const text = success ? '已更新' : (errorMsg || '获取失败');
            intlStatusDot.className = 'status-dot ' + status;
            intlStatusText.textContent = text;
            domesticStatusDot.className = 'status-dot ' + status;
            domesticStatusText.textContent = text;
            intlError.textContent = errorMsg ? `⚠️ ${errorMsg}` : '';
            domesticError.textContent = errorMsg ? `⚠️ ${errorMsg}` : '';
        }

        function updateCountdown() {
            const m = Math.floor(countdown/60), s = countdown%60;
            const str = m>0 ? `${m}分${s.toString().padStart(2,'0')}秒` : `${s}秒`;
            intlCountdown.textContent = str;
            domesticCountdown.textContent = str;
        }

        async function fetchAllData(manual = false) {
            if(isFetching && !manual) return;
            isFetching = true;
            setStatus(false, '');
            intlError.textContent = ''; domesticError.textContent = '';

            const [rate, goldPrice, silverPrice] = await Promise.all([
                fetchExchangeRate(),
                fetchMetalPrice('gold'),
                fetchMetalPrice('silver')
            ]);

            const curRate = rate || exchangeRate || 7.25;
            if(goldPrice) updateUI('gold', goldPrice, curRate);
            if(silverPrice) updateUI('silver', silverPrice, curRate);

            const success = !!(goldPrice || silverPrice);
            let errorMsg = '';
            if(!success) {
                errorMsg = '所有数据源均不可用，请检查网络或稍后重试';
            } else if(!goldPrice) {
                errorMsg = '黄金数据获取失败';
            } else if(!silverPrice) {
                errorMsg = '白银数据获取失败';
            }
            setStatus(success, errorMsg);

            countdown = REFRESH_INTERVAL;
            updateCountdown();
            isFetching = false;

            if(!success && !manual) {
                setTimeout(() => fetchAllData(false), 8000);
            }
        }

        setInterval(() => {
            countdown--;
            updateCountdown();
            if(countdown <= 0) {
                fetchAllData(false);
                countdown = REFRESH_INTERVAL;
            }
        }, 1000);

        fetchAllData(true);
        window.fetchAllData = fetchAllData;
    })();
</script>
</body>
</html>
